<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ඩිජිටල් වෙසක් සුබපැතුම් පත් සාදන්න</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@400;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Noto Serif Sinhala', 'Poppins', sans-serif;
            background-image: url('https://images.unsplash.com/photo-1620002589335-5b9e67d5e272?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column; /* ෆෝන් එකේදී පල්ලෙහාට හැදෙන්න */
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 1;
        }
        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 30px 20px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 2;
            animation: fadeIn 1.2s ease-in-out;
            margin-bottom: 20px; /* කාඩ් දෙක අතර ඉඩ */
        }
        h1 {
            color: #ffca28;
            font-size: 26px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(255,202,40,0.3);
        }
        .subtitle {
            font-size: 14px;
            color: #e0e0e0;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            font-family: 'Noto Serif Sinhala', sans-serif;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #ffca28;
            box-shadow: 0 0 15px rgba(255,202,40,0.2);
            background: rgba(255,255,255,0.15);
        }
        .btn {
            background: linear-gradient(45deg, #ff8f00, #ffca28);
            color: #1a1a1a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255,143,0,0.3);
            font-family: 'Noto Serif Sinhala', sans-serif;
        }
        .btn:active {
            transform: scale(0.98);
        }
        #cardOutput {
            display: none;
            background: linear-gradient(135deg, #1e2640, #111728);
            border: 2px solid #ffca28;
            animation: fadeIn 0.8s ease;
            width: 100%;
            max-width: 420px;
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 2;
            text-align: center;
        }
        .card-title {
            color: #ffca28;
            font-size: 22px;
            margin-bottom: 15px;
            text-shadow: 0 2px 8px rgba(255,202,40,0.4);
        }
        .card-wish {
            font-size: 15px;
            line-height: 1.8;
            color: #e0e6ed;
            margin-bottom: 20px;
            white-space: pre-line;
        }
        .card-from {
            font-size: 18px;
            color: #ffca28;
            font-weight: 700;
            text-shadow: 0 2px 5px rgba(255,202,40,0.2);
        }
        .share-section {
            margin-top: 20px;
        }
        .btn-whatsapp {
            background: #25d366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(37,211,102,0.3);
        }
        footer {
            margin-top: 25px;
            font-size: 11px;
            color: #7888a5;
            letter-spacing: 0.5px;
            z-index: 2;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🪔 වෙසක් ප්‍රාර්ථනා 🪔</h1>
        <p class="subtitle">ඔයාගේ නම ඇතුළත් කරලා පල්ලෙහායින් Digital වෙසක් කාඩ් එකක් හදාගන්න.</p>
        
        <div class="input-group">
            <input type="text" id="userName" placeholder="ඔයාගේ නම මෙතන ලියන්න">
        </div>
        
        <button class="btn" onclick="generateCard()">සුබපැතුම් පත සාදන්න ✨</button>
    </div>

    <div id="cardOutput">
        <div class="card-title">🪔 පින්බර වෙසක් මංගල්‍යයක් වේවා! 🪔</div>
        <div class="card-wish">ලොවිතුරු බුදු පියාණන් වහන්සේ වදාල ශ්‍රී සද්ධර්මයේ ආලෝකයෙන් ඔබගේ දිවිය සැනසෙත්වා! සැමට සාමය, සතුට පිරි පින්බර වෙසක් උත්සවයක් වේවා!</div>
        <div class="card-from" id="generatedName"></div>
        
        <div class="share-section" id="shareSection">
            <button class="btn btn-whatsapp" onclick="shareOnWhatsApp()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.992-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.316 1.592 5.43.001 9.85-4.417 9.853-9.847.002-2.63-1.023-5.101-2.817-6.896-1.793-1.795-4.168-2.782-6.793-2.783-5.433 0-9.853 4.418-9.856 9.848-.001 2.115.578 4.15 1.673 5.86l-.995 3.637 3.719-.976zm9.951-6.001c-.267-.134-1.579-.78-1.823-.867-.243-.088-.419-.133-.596.134-.176.265-.681.866-.835 1.043-.154.177-.308.199-.575.066-.267-.134-1.126-.415-2.145-1.325-.793-.707-1.329-1.581-1.485-1.848-.156-.266-.017-.409.117-.542.121-.12.267-.31.401-.465.135-.155.179-.266.269-.443.09-.178.045-.333-.023-.467-.067-.133-.596-1.435-.817-1.968-.215-.518-.432-.448-.596-.456-.153-.008-.331-.01-.508-.01s-.465.067-.708.333c-.243.266-.929.909-.929 2.217s.951 2.571 1.084 2.749c.133.178 1.871 2.856 4.532 4.002.633.273 1.127.436 1.512.559.635.202 1.212.174 1.669.106.51-.076 1.579-.643 1.8-.1.231-.22.518-.544.575-.81.057-.266.057-.494.04-.542-.017-.047-.067-.076-.334-.21z"/>
                </svg>
                යාලුවන්ට WhatsApp යවන්න
            </button>
        </div>
    </div>

    <footer>Created by Mobile Setup</footer>

    <script>
        function generateCard() {
            var name = document.getElementById("userName").value;
            if (name.trim() === "") {
                alert("කරුණාකර ඔයාගේ නම ඇතුළත් කරන්න!");
                return;
            }
            document.getElementById("generatedName").innerHTML = "- වෙතින් සිබපැතුම් - <br>" + name;
            document.getElementById("cardOutput").style.display = "block";
            
            // කාඩ් එක හැදුණාම ඒක ගාවට ස්ක්‍රෝල් වෙන්න
            setTimeout(function() {
                document.getElementById("cardOutput").scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        function shareOnWhatsApp() {
            var name = document.getElementById("userName").value;
            var currentUrl = window.location.href;
            var text = "🪔 *පින්බර වෙසක් මංගල්‍යයක් වේවා!* 🪔\n\n" + name + " ඔයාට එවපු ලස්සන වෙසක් සුබපැතුම මෙතනින් බලන්න 👇\n" + currentUrl;
            var whatsappUrl = "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
